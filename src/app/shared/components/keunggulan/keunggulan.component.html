<section class="keunggulan">
  <div class="keunggulan__container">

    <h2 class="keunggulan__title">{{ title }}</h2>

    <div class="keunggulan__grid">
      <div class="keunggulan__card" *ngFor="let item of items">

        <div class="keunggulan__icon-wrap">
          <!-- Ikon: Budidaya oleh Petani Lokal -->
          <svg *ngIf="item.icon === 'budidaya'" class="keunggulan__icon" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M14 30V20C14 17 16 14 19 14C22 14 24 17 24 20V30" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M24 30V18C24 15 26 12 29 12C32 12 34 15 34 18V30" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M9 30H39" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M12 30V36C12 37.1 12.9 38 14 38H34C35.1 38 36 37.1 36 36V30" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>

          <!-- Ikon: Kualitas Segar -->
          <svg *ngIf="item.icon === 'kualitas'" class="keunggulan__icon" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M24 12C24 12 32 16 32 25C32 30.5 28.4 35 24 35C19.6 35 16 30.5 16 25C16 16 24 12 24 12Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M24 35V40" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M19 23C19 23 20 27 24 28" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>

          <!-- Ikon: Tumbuh di Dataran Tinggi -->
          <svg *ngIf="item.icon === 'dataran'" class="keunggulan__icon" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M16 26V34" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M16 26C12 26 10 23 10 20" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M16 26C20 26 22 23 22 20" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M16 21V16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M32 26V34" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M32 26C28 26 26 23 26 20" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M32 26C36 26 38 23 38 20" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M32 21V14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M10 38H38" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-dasharray="2 3"/>
          </svg>
        </div>

        <h3 class="keunggulan__card-title">{{ item.title }}</h3>
        <p class="keunggulan__card-description">{{ item.description }}</p>

      </div>
    </div>

  </div>
</section>
