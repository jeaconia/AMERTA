<footer class="footer">
  <div class="footer__container">

    <div class="footer__col footer__col--about">
      <h3 class="footer__brand">{{ villageName }}</h3>
      <p class="footer__about">{{ about }}</p>
    </div>

    <div class="footer__col">
      <h4 class="footer__heading">Kontak Kami</h4>

      <ul class="footer__list">
        <li class="footer__item">
          <svg class="footer__icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2C8.13 2 5 5.13 5 9C5 14.25 12 22 12 22C12 22 19 14.25 19 9C19 5.13 15.87 2 12 2ZM12 11.5C10.62 11.5 9.5 10.38 9.5 9C9.5 7.62 10.62 6.5 12 6.5C13.38 6.5 14.5 7.62 14.5 9C14.5 10.38 13.38 11.5 12 11.5Z" fill="currentColor"/>
          </svg>
          <span>{{ address }}</span>
        </li>
        <li class="footer__item">
          <svg class="footer__icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M6.6 10.8C8.1 13.7 10.3 15.9 13.2 17.4L15.4 15.2C15.7 14.9 16.1 14.8 16.5 15C17.7 15.4 19 15.7 20.3 15.7C20.9 15.7 21.3 16.1 21.3 16.7V20.3C21.3 20.9 20.9 21.3 20.3 21.3C10.7 21.3 3 13.6 3 4C3 3.4 3.4 3 4 3H7.6C8.2 3 8.6 3.4 8.6 4C8.6 5.3 8.9 6.6 9.3 7.8C9.4 8.2 9.4 8.6 9.1 8.9L6.6 10.8Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span>{{ phone }}</span>
        </li>
        <li class="footer__item">
          <svg class="footer__icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="3" y="5" width="18" height="14" rx="2" stroke="currentColor" stroke-width="1.5"/>
            <path d="M3.5 6.5L12 13L20.5 6.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span>{{ email }}</span>
        </li>
      </ul>
    </div>

    <div class="footer__col">
      <h4 class="footer__heading">Social Media</h4>

      <div class="footer__socials">
        <a *ngFor="let social of socialLinks" [href]="social.url" class="footer__social-link" [attr.aria-label]="social.platform">

          <svg *ngIf="social.platform === 'instagram'" class="footer__social-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="3" y="3" width="18" height="18" rx="5" stroke="currentColor" stroke-width="1.5"/>
            <circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="1.5"/>
            <circle cx="17.5" cy="6.5" r="1" fill="currentColor"/>
          </svg>

          <svg *ngIf="social.platform === 'facebook'" class="footer__social-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.5"/>
            <path d="M14 8.5H13C12.2 8.5 11.5 9.2 11.5 10V12H14L13.6 14.5H11.5V20" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>

          <svg *ngIf="social.platform === 'youtube'" class="footer__social-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="2.5" y="6" width="19" height="12" rx="3" stroke="currentColor" stroke-width="1.5"/>
            <path d="M10.5 9.5L15 12L10.5 14.5V9.5Z" fill="currentColor"/>
          </svg>

          <svg *ngIf="social.platform === 'twitter'" class="footer__social-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M20 5L11 14.5M20 5L14.5 19L11 14.5M20 5L4 11L11 14.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>

        </a>
      </div>
    </div>

  </div>

  <div class="footer__bottom">
    <p class="footer__copyright">{{ copyrightText }}</p>
  </div>
</footer>
