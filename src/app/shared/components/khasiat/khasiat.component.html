<section class="khasiat">
  <div class="khasiat__container">

    <h2 class="khasiat__title">{{ title }}</h2>

    <div class="khasiat__grid">
      <div class="khasiat__item" *ngFor="let item of items">

        <div class="khasiat__icon-wrap">
          <!-- Ikon: Kaya Nutrisi -->
          <svg *ngIf="item.icon === 'nutrisi'" class="khasiat__icon" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M24 30C24 30 10 26 10 16C10 12 13 10 16 10C20 10 24 13 24 19C24 13 28 10 32 10C35 10 38 12 38 16C38 26 24 30 24 30Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M16 30C16 35 19 38 24 38C29 38 32 35 32 30" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>

          <!-- Ikon: Sumber Antioksidan -->
          <svg *ngIf="item.icon === 'antioksidan'" class="khasiat__icon" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="24" cy="24" r="4" stroke="currentColor" stroke-width="2"/>
            <path d="M24 20V10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M27.5 22L36.5 16.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M27.5 26L36.5 31.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M24 28V38" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M20.5 26L11.5 31.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M20.5 22L11.5 16.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <circle cx="24" cy="10" r="2" fill="currentColor"/>
            <circle cx="36.5" cy="16.5" r="2" fill="currentColor"/>
            <circle cx="36.5" cy="31.5" r="2" fill="currentColor"/>
            <circle cx="24" cy="38" r="2" fill="currentColor"/>
            <circle cx="11.5" cy="31.5" r="2" fill="currentColor"/>
            <circle cx="11.5" cy="16.5" r="2" fill="currentColor"/>
          </svg>

          <!-- Ikon: Baik untuk Kesehatan Jantung -->
          <svg *ngIf="item.icon === 'jantung'" class="khasiat__icon" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M24 38C24 38 8 28.5 8 18C8 12.5 12 9 16.5 9C20 9 23 11 24 14C25 11 28 9 31.5 9C36 9 40 12.5 40 18C40 28.5 24 38 24 38Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M14 20H19L22 16L26 24L29 20H34" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>

          <!-- Ikon: Mendukung Sistem Pencernaan -->
          <svg *ngIf="item.icon === 'pencernaan'" class="khasiat__icon" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M18 10C18 10 14 14 14 20C14 26 19 27 19 32C19 36 16 38 16 38" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M28 10C28 10 32 15 32 21C32 27 25 28 25 33C25 36 28 38 28 38" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>

        <div class="khasiat__text">
          <h3 class="khasiat__item-title">{{ item.title }}</h3>
          <p class="khasiat__item-description">{{ item.description }}</p>
        </div>

      </div>
    </div>

  </div>
</section>
