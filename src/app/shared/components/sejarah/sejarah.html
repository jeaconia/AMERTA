<section class="sejarah">
  <div class="sejarah__container">

    <div class="sejarah__text">
      <h2 class="sejarah__title">{{ title }}</h2>
      <p class="sejarah__paragraph">{{ paragraph1 }}</p>
      <p class="sejarah__paragraph">{{ paragraph2 }}</p>
    </div>

    <div class="sejarah__emblem-wrap">
      <img [src]="emblemUrl" alt="Lambang Desa Belok/Sidan: Asta Mandala Giri" class="sejarah__emblem">
    </div>

  </div>
</section>
