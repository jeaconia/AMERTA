<div class="card" [class.card--bordered]="bordered">
  <img *ngIf="imageUrl" [src]="imageUrl" [alt]="title" class="card__image">

  <div class="card__body">
    <h3 *ngIf="title" class="card__title">{{ title }}</h3>
    <p *ngIf="description" class="card__description">{{ description }}</p>

    <!-- Slot tambahan untuk konten custom, misal tombol "Lihat Detail" -->
    <ng-content></ng-content>
  </div>
</div>
