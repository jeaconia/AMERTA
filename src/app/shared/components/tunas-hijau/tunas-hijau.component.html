<section class="tunas-hijau">
  <div class="tunas-hijau__container">

    <div class="tunas-hijau__image-wrap">
      <img [src]="imageUrl" alt="Ikatan asparagus segar Desa Belok/Sidan" class="tunas-hijau__image">
    </div>

    <div class="tunas-hijau__text">
      <h2 class="tunas-hijau__title">{{ title }}</h2>
      <p class="tunas-hijau__paragraph">{{ paragraph1 }}</p>
      <p class="tunas-hijau__paragraph">{{ paragraph2 }}</p>
    </div>

  </div>
</section>
