<nav class="navbar">
  <img [src]="logoUrl" alt="Logo Desa Belok/Sidan" class="navbar__logo">

  <ul class="navbar__links">
    <li *ngFor="let link of links">
      <a [routerLink]="link.path" routerLinkActive="navbar__link--active" class="navbar__link">
        {{ link.label }}
      </a>
    </li>
  </ul>
</nav>
