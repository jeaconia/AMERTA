<section class="standar-kualitas">
  <div class="standar-kualitas__container">

    <h2 class="standar-kualitas__title">{{ title }}</h2>

    <div class="standar-kualitas__image-wrap">
      <img [src]="imageUrl" alt="Asparagus kualitas Grade A Desa Belok/Sidan" class="standar-kualitas__image">

      <div class="standar-kualitas__badge">
        <span class="standar-kualitas__price">{{ price }}</span>
      </div>
    </div>

    <p class="standar-kualitas__description">
      {{ descriptionBefore }} <strong>{{ highlightWord }}</strong>{{ descriptionAfter }}
    </p>

  </div>
</section>
