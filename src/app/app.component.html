<!-- Navbar reusable component -->
<app-navbar></app-navbar>

<main class="page-content">

  <!-- Section: Produk Unggulan, memakai CardComponent di dalam *ngFor -->
  <section class="produk-section">
    <h2>Produk Unggulan</h2>

    <div class="produk-grid">
      <app-card
        *ngFor="let produk of produkUnggulan"
        [imageUrl]="produk.image"
        [title]="produk.title"
        [description]="produk.description">

        <!-- Konten custom diisi lewat ng-content, contoh: tombol di dalam card -->
        <app-button
          label="Lihat Detail"
          variant="outline"
          size="sm"
          (clicked)="onLihatDetail(produk.title)">
        </app-button>
      </app-card>
    </div>
  </section>

  <!-- Contoh pemakaian ButtonComponent langsung dengan variant berbeda -->
  <section class="cta-section">
    <app-button label="Hubungi Kami" variant="primary" size="lg"></app-button>
    <app-button label="Lihat Peta Desa" variant="secondary" size="md"></app-button>
  </section>

  <!-- Routed pages (Beranda / Produk / Peta) akan dirender di sini -->
  <router-outlet></router-outlet>

</main>
